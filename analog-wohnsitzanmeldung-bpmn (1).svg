<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1460 520" width="1460" height="520" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <filter id="sh" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#DC2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1460" height="520" fill="#FDFDFD" rx="6"/>

  <!-- Pool Header -->
  <rect x="16" y="12" width="1428" height="36" rx="5" fill="#44403C"/>
  <text x="730" y="35" text-anchor="middle" fill="#FAFAF9" font-size="13" font-weight="600" letter-spacing="0.4">Analoge Wohnsitzanmeldung - Persoenlicher Besuch im Buergeramt</text>

  <!-- Lane: Buerger:in -->
  <rect x="16" y="48" width="1428" height="140" fill="#FDF8F3" stroke="#E7E5E4" stroke-width="0.5"/>
  <rect x="16" y="48" width="30" height="140" fill="#F5EDE6"/>
  <text x="31" y="118" text-anchor="middle" fill="#78350F" font-size="10" font-weight="600" transform="rotate(-90 31 118)">Buerger:in</text>

  <!-- Lane: Wartebereich -->
  <rect x="16" y="188" width="1428" height="110" fill="#FAF5FF" stroke="#E7E5E4" stroke-width="0.5"/>
  <rect x="16" y="188" width="30" height="110" fill="#F3E8FF"/>
  <text x="31" y="248" text-anchor="middle" fill="#6B21A8" font-size="10" font-weight="600" transform="rotate(-90 31 248)">Wartebereich</text>

  <!-- Lane: Sachbearbeiter:in -->
  <rect x="16" y="298" width="1428" height="170" fill="#F0F5FF" stroke="#E7E5E4" stroke-width="0.5"/>
  <rect x="16" y="298" width="30" height="170" fill="#DBEAFE"/>
  <text x="31" y="388" text-anchor="middle" fill="#1E3A8A" font-size="10" font-weight="600" transform="rotate(-90 31 388)">Sachbearbeiter:in</text>

  <!-- =========== FLOWS =========== -->

  <!-- Start -> T1 -->
  <line x1="104" y1="118" x2="140" y2="118" stroke="#64748B" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- T1 -> T2 (down to Wartebereich) -->
  <polyline points="272,142 272,236 320,236" stroke="#64748B" stroke-width="1.3" marker-end="url(#arrow)" fill="none"/>

  <!-- T2 -> T3 -->
  <line x1="452" y1="236" x2="496" y2="236" stroke="#64748B" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- T3 -> T4 (down to Sachbearbeiter) -->
  <polyline points="628,260 628,375 662,375" stroke="#64748B" stroke-width="1.3" marker-end="url(#arrow)" fill="none"/>

  <!-- T4 -> G1 -->
  <line x1="794" y1="375" x2="836" y2="375" stroke="#64748B" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- G1 -> Nein (up to Buerger lane - Abbruch) -->
  <polyline points="858,355 858,118 900,118" stroke="#DC2626" stroke-width="1.2" stroke-dasharray="5 3" marker-end="url(#arrowR)" fill="none"/>
  <rect x="864" y="220" width="32" height="15" rx="3" fill="#FEE2E2" stroke="#FECACA" stroke-width="0.5"/>
  <text x="880" y="230" text-anchor="middle" fill="#DC2626" font-size="8" font-weight="600">Nein</text>

  <!-- G1 -> Ja -> T5 -->
  <line x1="880" y1="375" x2="930" y2="375" stroke="#64748B" stroke-width="1.3" marker-end="url(#arrow)"/>
  <rect x="886" y="358" width="24" height="15" rx="3" fill="#DCFCE7" stroke="#BBF7D0" stroke-width="0.5"/>
  <text x="898" y="368" text-anchor="middle" fill="#166534" font-size="8" font-weight="600">Ja</text>

  <!-- T5 -> T6 -->
  <line x1="1062" y1="375" x2="1096" y2="375" stroke="#64748B" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- T6 -> T7 -->
  <line x1="1228" y1="375" x2="1262" y2="375" stroke="#64748B" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- T7 -> T8 (direct straight up to Buerger lane) -->
  <polyline points="1362,351 1362,118 1400,118" stroke="#64748B" stroke-width="1.3" marker-end="url(#arrow)" fill="none"/>

  <!-- Nachfordern -> End-Abbruch -->
  <line x1="1032" y1="118" x2="1066" y2="118" stroke="#DC2626" stroke-width="1.2" marker-end="url(#arrowR)"/>

  <!-- T8 -> End -->
  <line x1="1400" y1="142" x2="1400" y2="172" stroke="#64748B" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- =========== NODES =========== -->

  <!-- START -->
  <circle cx="86" cy="118" r="16" fill="white" stroke="#44403C" stroke-width="1.8" filter="url(#sh)"/>
  <text x="86" y="150" text-anchor="middle" fill="#57534E" font-size="9">Buerger betritt</text>
  <text x="86" y="161" text-anchor="middle" fill="#57534E" font-size="9">Buergeramt</text>

  <!-- T1 -->
  <rect x="140" y="94" width="132" height="48" rx="6" fill="white" stroke="#44403C" stroke-width="1.2" filter="url(#sh)"/>
  <text x="206" y="115" text-anchor="middle" fill="#1C1917" font-size="11" font-weight="600">Anmeldeformular</text>
  <text x="206" y="130" text-anchor="middle" fill="#78716C" font-size="9.5">ausfuellen (Papier)</text>

  <!-- T2 -->
  <rect x="320" y="212" width="132" height="48" rx="6" fill="white" stroke="#6B21A8" stroke-width="1.2" filter="url(#sh)"/>
  <text x="386" y="233" text-anchor="middle" fill="#1C1917" font-size="11" font-weight="600">Wartenummer</text>
  <text x="386" y="248" text-anchor="middle" fill="#78716C" font-size="9.5">ziehen</text>

  <!-- T3 -->
  <rect x="496" y="212" width="132" height="48" rx="6" fill="white" stroke="#6B21A8" stroke-width="1.2" filter="url(#sh)"/>
  <text x="562" y="233" text-anchor="middle" fill="#1C1917" font-size="11" font-weight="600">Warten</text>
  <text x="562" y="248" text-anchor="middle" fill="#78716C" font-size="9.5">bis Aufruf</text>

  <!-- T4 -->
  <rect x="662" y="351" width="132" height="48" rx="6" fill="white" stroke="#1E3A8A" stroke-width="1.2" filter="url(#sh)"/>
  <text x="728" y="372" text-anchor="middle" fill="#1C1917" font-size="11" font-weight="600">Identifikation</text>
  <text x="728" y="387" text-anchor="middle" fill="#78716C" font-size="9.5">pruefen (Ausweis)</text>

  <!-- G1 -->
  <g transform="translate(858,375)">
    <polygon points="0,-20 20,0 0,20 -20,0" fill="white" stroke="#44403C" stroke-width="1.2" filter="url(#sh)"/>
    <text x="0" y="4" text-anchor="middle" fill="#44403C" font-size="12" font-weight="700">X</text>
  </g>
  <text x="858" y="410" text-anchor="middle" fill="#57534E" font-size="8.5" font-style="italic">Unterlagen</text>
  <text x="858" y="421" text-anchor="middle" fill="#57534E" font-size="8.5" font-style="italic">vollstaendig?</text>

  <!-- T-Nachfordern -->
  <rect x="900" y="94" width="132" height="48" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1" filter="url(#sh)"/>
  <text x="966" y="115" text-anchor="middle" fill="#991B1B" font-size="11" font-weight="600">Unterlagen fehlen</text>
  <text x="966" y="130" text-anchor="middle" fill="#991B1B" font-size="9.5">erneut kommen</text>

  <!-- End-Abbruch -->
  <circle cx="1084" cy="118" r="16" fill="white" stroke="#DC2626" stroke-width="3" filter="url(#sh)"/>
  <circle cx="1084" cy="118" r="11" fill="#DC2626" opacity="0.12"/>
  <text x="1084" y="150" text-anchor="middle" fill="#DC2626" font-size="9">Abbruch</text>

  <!-- T5 -->
  <rect x="930" y="351" width="132" height="48" rx="6" fill="white" stroke="#1E3A8A" stroke-width="1.2" filter="url(#sh)"/>
  <text x="996" y="372" text-anchor="middle" fill="#1C1917" font-size="11" font-weight="600">Daten erfassen</text>
  <text x="996" y="387" text-anchor="middle" fill="#78716C" font-size="9.5">(Fachverfahren)</text>

  <!-- T6 -->
  <rect x="1096" y="351" width="132" height="48" rx="6" fill="white" stroke="#1E3A8A" stroke-width="1.2" filter="url(#sh)"/>
  <text x="1162" y="372" text-anchor="middle" fill="#1C1917" font-size="11" font-weight="600">Bescheinigung</text>
  <text x="1162" y="387" text-anchor="middle" fill="#78716C" font-size="9.5">drucken</text>

  <!-- T7 -->
  <rect x="1262" y="351" width="132" height="48" rx="6" fill="white" stroke="#1E3A8A" stroke-width="1.2" filter="url(#sh)"/>
  <text x="1328" y="372" text-anchor="middle" fill="#1C1917" font-size="11" font-weight="600">Gebuehren</text>
  <text x="1328" y="387" text-anchor="middle" fill="#78716C" font-size="9.5">kassieren</text>

  <!-- T8 -->
  <rect x="1340" y="94" width="120" height="48" rx="6" fill="white" stroke="#44403C" stroke-width="1.2" filter="url(#sh)"/>
  <text x="1400" y="115" text-anchor="middle" fill="#1C1917" font-size="11" font-weight="600">Bescheinigung</text>
  <text x="1400" y="130" text-anchor="middle" fill="#78716C" font-size="9.5">entgegennehmen</text>

  <!-- END -->
  <circle cx="1400" cy="190" r="16" fill="white" stroke="#44403C" stroke-width="3" filter="url(#sh)"/>
  <circle cx="1400" cy="190" r="11" fill="#44403C" opacity="0.12"/>
  <text x="1400" y="222" text-anchor="middle" fill="#57534E" font-size="9">Anmeldung</text>
  <text x="1400" y="233" text-anchor="middle" fill="#57534E" font-size="9">abgeschlossen</text>

  <!-- Footer -->
  <text x="730" y="504" text-anchor="middle" fill="#A8A29E" font-size="9" letter-spacing="1.2">BPMN 2.0 STANDARD NOTATION</text>
  <text x="1410" y="504" text-anchor="end" fill="#A8A29E" font-size="8.5" font-weight="500">Analog Template v1.0</text>
</svg>